<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Private Collection</title>
    <!-- Elegant editorial fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* Force the app to fit exactly on a single mobile screen with zero scrolling */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Strict scroll lock */
            background: #080808;
            color: #f5f5f7;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Lights On Mode Styles */
        body.lights-on {
            background: #f4f4f0; /* Soft, clean gallery white */
            color: #1a1a1a;
        }

        /* Main container structured to dynamically fit any phone height */
        .app-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            padding: 20px 15px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        /* The Interactive Light Switch */
        .switch-container {
            margin-top: 10px;
            z-index: 10;
        }

        .switch-btn {
            background: transparent;
            border: 1px solid currentColor;
            color: inherit;
            padding: 8px 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* The Mysterious Flashlight Overlay */
        .flashlight-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 5;
            background: radial-gradient(
                circle 110px at var(--x, 50%) var(--y, 50%), 
                rgba(229, 193, 88, 0.08) 0%, 
                rgba(8, 8, 8, 0.2) 50%, 
                rgba(8, 8, 8, 0.98) 95%
            );
            opacity: 0; /* Hidden when lights are on */
            transition: opacity 0.5s ease;
            will-change: background;
        }

        body.dark-mode .flashlight-overlay {
            opacity: 1; /* Fully active when lights are off */
        }

        /* Compact, elegant header */
        header {
            margin-top: 5px;
            margin-bottom: 10px;
            text-align: center;
            flex-shrink: 0;
            z-index: 10;
        }

        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            color: #e5c158; /* Soft Champagne Gold */
            font-size: 2.2rem;
            font-weight: 300;
            margin: 0 0 4px 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: color 0.5s ease;
        }

        body.lights-on h1 {
            color: #bfa370; /* Slightly deeper gold for readability on white */
        }

        p.subtitle {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            color: #a69f88;
            font-size: 1.15rem;
            margin: 0;
            letter-spacing: 1px;
        }

        /* Centered Welcome / Teaser Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .teaser-quote {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            font-size: 1.5rem;
            color: #d4af37;
            line-height: 1.5;
            margin-bottom: 15px;
            transition: color 0.5s ease;
        }

        body.lights-on .teaser-quote {
            color: #1a1a1a;
        }

        .instruction-tip {
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* Cheeky Cheater Screen */
        .cheeky-screen {
            display: none; /* Only triggered if they turn lights ON during gallery view */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        /* 2x3 grid that takes up the remaining vertical screen space */
        .gallery-grid {
            display: none; 
            grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: repeat(3, 1fr);    
            gap: 10px;
            width: 100%;
            max-width: 450px;
            flex-grow: 1; 
            margin: 10px 0;
            min-height: 0; 
        }

        /* Wrapper that flex-centers the actual image shape */
        .gallery-item-wrapper {
            position: relative;
            overflow: hidden;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Standardized border and shadow wraps the natural image edge */
        .gallery-item {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            border-radius: 6px;
            border: 1px solid rgba(229, 193, 88, 0.25); 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            filter: brightness(0.95) contrast(1.02);
            display: block;
        }

        /* Seductive, low-profile button at the very bottom */
        .load-btn {
            background: transparent;
            color: inherit;
            border: 1px solid currentColor;
            padding: 14px 0;
            width: 100%;
            max-width: 280px;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 17px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 5px;
            flex-shrink: 0;
            z-index: 10; 
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent; 
        }

        .load-btn:active {
            background: #e5c158;
            color: #080808;
            border-color: #e5c158;
            transform: scale(0.98);
        }

        /* CSS Animations for smooth transitions */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="lights-on"> <!-- Starts with light background -->

    <!-- The physical flashlight layer -->
    <div class="flashlight-overlay" id="flashlight"></div>

    <div class="app-container">
        
        <header>
            <h1>The Velvet Vault</h1>
            <p class="subtitle">Strictly Confidential</p>
            <div class="switch-container">
                <button id="switchBtn" class="switch-btn">Turn Light Off 💡</button>
            </div>
        </header>

        <!-- 1. The Welcome Screen (Shown initially when lights are ON) -->
        <div id="welcomeScreen" class="welcome-screen fade-in">
            <p class="teaser-quote">"I set up a little private gallery just for you..."</p>
            <p class="instruction-tip">Turn off the light to step inside.</p>
        </div>

        <!-- 2. Cheeky Screen (Triggered if they cheat and turn the lights back ON) -->
        <div id="cheekyScreen" class="cheeky-screen fade-in">
            <p class="teaser-quote">"No cheating! 😉<br>A secret vault can only be viewed in the dark."</p>
            <p class="instruction-tip">Turn the light back off to continue...</p>
        </div>

        <!-- 3. The Photo Grid -->
        <div id="gallery" class="gallery-grid"></div>

        <!-- 4. The Control Button -->
        <button id="loadMoreBtn" class="load-btn">Unveil the Vault</button>

    </div>

    <script>
        const allImages = [
            "images/image1.jpg", "images/image2.jpg", "images/image3.jpg", "images/image4.jpg", "images/image5.jpg",
            "images/image6.jpg", "images/image7.jpg", "images/image8.jpg", "images/image9.jpg", "images/image10.jpg",
            "images/image11.jpg", "images/image12.jpg", "images/image13.jpg", "images/image14.jpg", "images/image15.jpg",
            "images/image16.jpg", "images/image17.jpg", "images/image18.jpg", "images/image19.jpg", "images/image20.jpg",
            "images/image21.jpg", "images/image22.jpg", "images/image23.jpg", "images/image24.jpg", "images/image25.jpg",
            "images/image26.jpg", "images/image27.jpg", "images/image28.jpg", "images/image29.jpg", "images/image30.jpg"
        ];

        const imagesToShow = 6;
        const welcomeScreen = document.getElementById('welcomeScreen');
        const cheekyScreen = document.getElementById('cheekyScreen');
        const galleryContainer = document.getElementById('gallery');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const switchBtn = document.getElementById('switchBtn');
        const flashlight = document.getElementById('flashlight');
        
        let lightsOn = true;
        let hasUnlocked = false;

        // --- SMOOTH WANDERING FLASHLIGHT SCRIPT ---
        let currentX = window.innerWidth / 2;
        let currentY = window.innerHeight / 2;
        let targetX = currentX;
        let targetY = currentY;

        function getNewTarget() {
            targetX = Math.random() * (window.innerWidth - 160) + 80;
            targetY = Math.random() * (window.innerHeight - 200) + 100;
            setTimeout(getNewTarget, Math.random() * 1500 + 1500);
        }

        function animateFlashlight() {
            currentX += (targetX - currentX) * 0.03;
            currentY += (targetY - currentY) * 0.03;

            flashlight.style.setProperty('--x', `${currentX}px`);
            flashlight.style.setProperty('--y', `${currentY}px`);

            requestAnimationFrame(animateFlashlight);
        }

        getNewTarget();
        animateFlashlight();


        // --- LIGHT SWITCH LOGIC ---
        switchBtn.addEventListener('click', () => {
            if (lightsOn) {
                // TURN LIGHTS OFF (Enter the vault)
                document.body.classList.remove('lights-on');
                document.body.classList.add('dark-mode');
                switchBtn.innerText = "Turn Light On 💡";
                lightsOn = false;

                // Hide cheekiness or introductory screens
                cheekyScreen.style.display = 'none';
                welcomeScreen.style.display = 'none';

                // Display the grid and set up initial images if it's the first time
                galleryContainer.style.display = 'grid';
                if (!hasUnlocked) {
                    showRandomImages();
                    hasUnlocked = true;
                }
                loadMoreBtn.style.display = 'block';
            } else {
                // TURN LIGHTS ON (Cheating / Exiting)
                document.body.classList.add('lights-on');
                document.body.classList.remove('dark-mode');
                switchBtn.innerText = "Turn Light Off 💡";
                lightsOn = true;

                // Hide photos completely and trigger cheeky callout
                galleryContainer.style.display = 'none';
                loadMoreBtn.style.display = 'none';
                welcomeScreen.style.display = 'none';
                cheekyScreen.style.display = 'flex';
            }
        });


        // --- GALLERY GENERATOR ---
        function showRandomImages() {
            window.scrollTo({ top: 0, behavior: 'instant' });

            // Ensure button text changes after first reveal
            loadMoreBtn.innerText = "Unveil 6 More";

            galleryContainer.innerHTML = '';

            const shuffled = [...allImages].sort(() => 0.5 - Math.random());
            const selection = shuffled.slice(0, imagesToShow);

            selection.forEach((src) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'gallery-item-wrapper fade-in';

                const img = document.createElement('img');
                img.src = src;
                img.alt = "Private Gallery Image";
                img.className = "gallery-item";
                
                img.onerror = function() {
                    wrapper.style.display = 'none';
                };
                
                wrapper.appendChild(img);
                galleryContainer.appendChild(wrapper);
            });
        }

        // Hide main button until they actually turn off the lights for the first time
        loadMoreBtn.style.display = 'none';
        loadMoreBtn.addEventListener('click', showRandomImages);
    </script>

</body>
</html>
