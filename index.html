<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Private Collection</title>
    <!-- Elegant editorial fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* Force the app to fit exactly on a single mobile screen with zero scrolling */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Strict scroll lock */
            background: #080808;
            color: #f5f5f7;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
        }

        /* Main container structured to dynamically fit any phone height */
        .app-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            padding: 20px 15px;
            box-sizing: border-box;
        }

        /* Compact, elegant header */
        header {
            margin-top: 5px;
            margin-bottom: 10px;
            text-align: center;
            flex-shrink: 0;
        }

        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            color: #e5c158; /* Soft Champagne Gold */
            font-size: 2.2rem;
            font-weight: 300;
            margin: 0 0 4px 0;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        p.subtitle {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            color: #a69f88;
            font-size: 1.15rem;
            margin: 0;
            letter-spacing: 1px;
        }

        /* Centered Welcome / Teaser Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .teaser-quote {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            font-size: 1.6rem;
            color: #d4af37;
            line-height: 1.5;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(229, 193, 88, 0.15);
        }

        /* 2x3 grid that takes up the remaining vertical screen space */
        .gallery-grid {
            display: none; /* Hidden on load until button is clicked */
            grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: repeat(3, 1fr);    
            gap: 10px;
            width: 100%;
            max-width: 450px;
            flex-grow: 1; 
            margin: 10px 0;
            min-height: 0; /* Crucial for nested flexbox scaling */
        }

        /* The Wrapper: Acts as a clean container but DOES NOT force a background crop */
        .gallery-item-wrapper {
            position: relative;
            overflow: hidden;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The actual image now scales flawlessly within its grid area with NO cropping */
        .gallery-item {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Keeps 100% of the image visible */
            border-radius: 6px;
            border: 1px solid rgba(229, 193, 88, 0.25); /* Elegant gold border follows the photo shape */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            filter: brightness(0.95) contrast(1.02);
            display: block;
        }

        /* Seductive, low-profile button at the very bottom */
        .load-btn {
            background: transparent;
            color: #e5c158;
            border: 1px solid rgba(229, 193, 88, 0.4);
            padding: 14px 0;
            width: 100%;
            max-width: 280px;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 17px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 5px;
            flex-shrink: 0;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent; /* Removes iOS touch flash */
        }

        .load-btn:active {
            background-color: #e5c158;
            color: #080808;
            border-color: #e5c158;
            transform: scale(0.98);
        }

        /* CSS Animations for smooth transitions */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <header>
            <h1>The Velvet Vault</h1>
            <p class="subtitle">Strictly Confidential</p>
        </header>

        <!-- 1. The Welcome Screen (Displays first instead of images) -->
        <div id="welcomeScreen" class="welcome-screen fade-in">
            <p class="teaser-quote">"I had a little private photoshoot just for you...<br>Care to see what's hidden inside?"</p>
        </div>

        <!-- 2. The Photo Grid (Starts hidden) -->
        <div id="gallery" class="gallery-grid"></div>

        <!-- 3. The Control Button -->
        <button id="loadMoreBtn" class="load-btn">Unveil the Vault</button>

    </div>

    <script>
        const allImages = [
            "images/image1.jpg", "images/image2.jpg", "images/image3.jpg", "images/image4.jpg", "images/image5.jpg",
            "images/image6.jpg", "images/image7.jpg", "images/image8.jpg", "images/image9.jpg", "images/image10.jpg",
            "images/image11.jpg", "images/image12.jpg", "images/image13.jpg", "images/image14.jpg", "images/image15.jpg",
            "images/image16.jpg", "images/image17.jpg", "images/image18.jpg", "images/image19.jpg", "images/image20.jpg",
            "images/image21.jpg", "images/image22.jpg", "images/image23.jpg", "images/image24.jpg", "images/image25.jpg",
            "images/image26.jpg", "images/image27.jpg", "images/image28.jpg", "images/image29.jpg", "images/image30.jpg"
        ];

        const imagesToShow = 6;
        const welcomeScreen = document.getElementById('welcomeScreen');
        const galleryContainer = document.getElementById('gallery');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        
        let hasUnlocked = false;

        // Function to select and display 6 completely random images
        function showRandomImages() {
            // Force viewport to the top of the screen
            window.scrollTo({ top: 0, behavior: 'instant' });

            // If this is the first click, swap the welcome screen for the gallery grid
            if (!hasUnlocked) {
                welcomeScreen.style.display = 'none';
                galleryContainer.style.display = 'grid';
                loadMoreBtn.innerText = "Unveil 6 More"; // Change the button text for subsequent clicks
                hasUnlocked = true;
            }

            // Clear the grid
            galleryContainer.innerHTML = '';

            // Clone and shuffle
            const shuffled = [...allImages].sort(() => 0.5 - Math.random());
            const selection = shuffled.slice(0, imagesToShow);

            selection.forEach((src) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'gallery-item-wrapper fade-in';

                const img = document.createElement('img');
                img.src = src;
                img.alt = "Private Gallery Image";
                img.className = "gallery-item";
                
                // If a photo path fails, hide that grid cell automatically
                img.onerror = function() {
                    wrapper.style.display = 'none';
                };
                
                wrapper.appendChild(img);
                galleryContainer.appendChild(wrapper);
            });
        }

        loadMoreBtn.addEventListener('click', showRandomImages);
    </script>

</body>
</html>
