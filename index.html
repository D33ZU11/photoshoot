<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Private Collection</title>
    <!-- Elegant editorial fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* Force the app to fit exactly on a single mobile screen with zero scrolling */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Strict scroll lock */
            background: #020202; /* Deep pitch black start */
            color: #f5f5f7;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Main container structured to dynamically fit any phone height */
        .app-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            padding: 20px 15px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        /* Always visible Light Switch at the top */
        .switch-container {
            margin-top: 10px;
            z-index: 10;
        }

        .switch-btn {
            background: transparent;
            border: 1px solid #e5c158;
            color: #e5c158;
            padding: 10px 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Flashing glow animation to influence the user to tap it */
        @keyframes pulseGlow {
            0% {
                background: rgba(229, 193, 88, 0);
                box-shadow: 0 0 0 0 rgba(229, 193, 88, 0);
            }
            50% {
                background: rgba(229, 193, 88, 0.15);
                box-shadow: 0 0 15px 2px rgba(229, 193, 88, 0.4);
            }
            100% {
                background: rgba(229, 193, 88, 0);
                box-shadow: 0 0 0 0 rgba(229, 193, 88, 0);
            }
        }

        .switch-btn.suggest-tap {
            animation: pulseGlow 1.8s infinite ease-in-out;
            border-color: #e5c158;
            color: #e5c158;
        }

        /* Interactive Theater Spotlight Mask (For Welcome & Cheeky Screens) */
        .spotlight-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* Allows gestures to pass through to container */
            z-index: 3;
            /* Massive, dramatic sweeping spotlight beam for Page 1 */
            background: radial-gradient(
                circle 260px at var(--spot-x, 50%) var(--spot-y, 50%), 
                rgba(229, 193, 88, 0.28) 0%, 
                rgba(229, 193, 88, 0.08) 45%,
                rgba(8, 8, 8, 0.4) 70%, 
                rgba(2, 2, 2, 1) 100%
            );
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: background;
        }

        body.spotlight-active .spotlight-mask {
            opacity: 1; /* Shows the spotlight when lights are "ON" */
        }

        /* The Wandering Flashlight Layer (Only active during live gallery viewing) */
        .flashlight-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 5;
            /* Intimate beam size for searching through photos */
            background: radial-gradient(
                circle 115px at var(--flash-x, 50%) var(--flash-y, 50%), 
                rgba(229, 193, 88, 0.12) 0%, 
                rgba(8, 8, 8, 0.2) 50%, 
                rgba(2, 2, 2, 0.98) 95%
            );
            opacity: 0;
            transition: opacity 0.5s ease;
            will-change: background;
        }

        body.gallery-active .flashlight-overlay {
            opacity: 1; /* Turns on wandering flashlight only when photos are visible */
        }

        /* Compact, elegant header */
        header {
            margin-top: 5px;
            margin-bottom: 10px;
            text-align: center;
            flex-shrink: 0;
            z-index: 10;
        }

        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            color: #e5c158; 
            font-size: 2.2rem;
            font-weight: 300;
            margin: 0 0 4px 0;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        p.subtitle {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            color: #a69f88;
            font-size: 1.15rem;
            margin: 0;
            letter-spacing: 1px;
        }

        /* Centered Screens (Welcome and Cheeky) */
        .message-screen {
            display: none; /* Controlled via JS */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 4;
        }

        .teaser-quote {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            font-size: 1.5rem;
            color: #e5c158;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .instruction-tip {
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #a69f88;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* 2x3 Grid */
        .gallery-grid {
            display: none; 
            grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: repeat(3, 1fr);    
            gap: 10px;
            width: 100%;
            max-width: 450px;
            flex-grow: 1; 
            margin: 10px 0;
            min-height: 0; 
            z-index: 2;
        }

        .gallery-item-wrapper {
            position: relative;
            overflow: hidden;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-item {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            border-radius: 6px;
            border: 1px solid rgba(229, 193, 88, 0.25); 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            filter: brightness(0.95) contrast(1.02);
            display: block;
        }

        /* The Reveal Button at the bottom */
        .load-btn {
            display: none; /* Initially hidden until light turns on */
            background: transparent;
            color: #e5c158;
            border: 1px solid rgba(229, 193, 88, 0.5);
            padding: 14px 0;
            width: 100%;
            max-width: 280px;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 17px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 5px;
            flex-shrink: 0;
            z-index: 10; 
            -webkit-tap-highlight-color: transparent; 
        }

        .load-btn:active {
            background: #e5c158;
            color: #020202;
            border-color: #e5c158;
            transform: scale(0.98);
        }

        /* 5-second delay fade-in animation for the first load */
        @keyframes delayedFadeIn {
            0% { opacity: 0; visibility: hidden; }
            1% { visibility: visible; }
            100% { opacity: 1; }
        }

        .first-reveal-fade {
            animation: delayedFadeIn 2s ease-out 5s forwards;
            opacity: 0; /* Keeps it invisible until animation starts */
        }

        /* Standard quick fade-in for images or general interactions */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body>

    <!-- Static/Interactive Stage Spotlight Overlay -->
    <div class="spotlight-mask" id="spotlight"></div>

    <!-- Wandering Flashlight Overlay -->
    <div class="flashlight-overlay" id="flashlight"></div>

    <div class="app-container" id="interactionArea">
        
        <header>
            <h1>The Velvet Vault</h1>
            <p class="subtitle">Strictly Confidential</p>
            <div class="switch-container">
                <button id="switchBtn" class="switch-btn">Turn Light On 💡</button>
            </div>
        </header>

        <!-- 1. The Welcome Screen -->
        <div id="welcomeScreen" class="message-screen fade-in">
            <p class="teaser-quote">"I had a little private photoshoot just for you...<br>Care to see what's hidden inside?"</p>
            <p class="instruction-tip">💡 Swipe around to look closer...</p>
        </div>

        <!-- 2. Cheeky Screen (If they cheat) -->
        <div id="cheekyScreen" class="message-screen fade-in">
            <p class="teaser-quote">"No cheating! 😉<br>A secret vault can only be viewed in the dark."</p>
            <p class="instruction-tip">Turn the light back off to continue...</p>
        </div>

        <!-- 3. The Photo Grid -->
        <div id="gallery" class="gallery-grid"></div>

        <!-- 4. The Control Button -->
        <button id="loadMoreBtn" class="load-btn">Unveil the Vault</button>

    </div>

    <script>
        const allImages = [
            "images/image1.jpg", "images/image2.jpg", "images/image3.jpg", "images/image4.jpg", "images/image5.jpg",
            "images/image6.jpg", "images/image7.jpg", "images/image8.jpg", "images/image9.jpg", "images/image10.jpg",
            "images/image11.jpg", "images/image12.jpg", "images/image13.jpg", "images/image14.jpg", "images/image15.jpg",
            "images/image16.jpg", "images/image17.jpg", "images/image18.jpg", "images/image19.jpg", "images/image20.jpg",
            "images/image21.jpg", "images/image22.jpg", "images/image23.jpg", "images/image24.jpg", "images/image25.jpg",
            "images/image26.jpg", "images/image27.jpg", "images/image28.jpg", "images/image29.jpg", "images/image30.jpg"
        ];

        const imagesToShow = 6;
        const welcomeScreen = document.getElementById('welcomeScreen');
        const cheekyScreen = document.getElementById('cheekyScreen');
        const galleryContainer = document.getElementById('gallery');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const switchBtn = document.getElementById('switchBtn');
        const spotlight = document.getElementById('spotlight');
        const flashlight = document.getElementById('flashlight');
        const interactionArea = document.getElementById('interactionArea');
        
        let lightsOn = false; // Starts in pitch black
        let galleryUnlocked = false;
        
        // Interaction states for both systems
        let isUserInteractingSpot = false;
        let isUserInteractingFlash = false;
        let spotTimeout;
        let flashTimeout;

        // --- COORDINATES FOR LIGHT SYSTEMS ---
        let currentSpotX = window.innerWidth / 2;
        let currentSpotY = window.innerHeight / 2;
        let targetSpotX = currentSpotX;
        let targetSpotY = currentSpotY;

        let currentFlashX = window.innerWidth / 2;
        let currentFlashY = window.innerHeight / 2;
        let targetFlashX = currentFlashX;
        let targetFlashY = currentFlashY;

        // --- SPOTLIGHT (PAGE 1) AUTOMATIC DRIFTING ---
        function getNewSpotlightTarget() {
            if (!isUserInteractingSpot) {
                targetSpotX = Math.random() * (window.innerWidth - 120) + 60;
                targetSpotY = Math.random() * (window.innerHeight - 160) + 80;
            }
            setTimeout(getNewSpotlightTarget, Math.random() * 1500 + 1500);
        }

        // --- FLASHLIGHT (PAGE 2) AUTOMATIC DRIFTING ---
        function getNewFlashlightTarget() {
            if (!isUserInteractingFlash) {
                targetFlashX = Math.random() * (window.innerWidth - 160) + 80;
                targetFlashY = Math.random() * (window.innerHeight - 200) + 100;
            }
            setTimeout(getNewFlashlightTarget, Math.random() * 1500 + 1500);
        }

        // --- ANIMATION LOOP ---
        function animateLights() {
            // Smoothly glide the Theater Spotlight (Page 1)
            currentSpotX += (targetSpotX - currentSpotX) * 0.04;
            currentSpotY += (targetSpotY - currentSpotY) * 0.04;
            spotlight.style.setProperty('--spot-x', `${currentSpotX}px`);
            spotlight.style.setProperty('--spot-y', `${currentSpotY}px`);

            // Smoothly glide the Wandering Flashlight (Page 2)
            currentFlashX += (targetFlashX - currentFlashX) * 0.035;
            currentFlashY += (targetFlashY - currentFlashY) * 0.035;
            flashlight.style.setProperty('--flash-x', `${currentFlashX}px`);
            flashlight.style.setProperty('--flash-y', `${currentFlashY}px`);

            requestAnimationFrame(animateLights);
        }

        // Initialize targets and begin the animation loop
        getNewSpotlightTarget();
        getNewFlashlightTarget();
        animateLights();


        // --- DRAG / SWIPE INTERACTION (HANDLES BOTH SCREENS) ---
        function handlePointerMove(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            if (lightsOn && !galleryUnlocked) {
                // PAGE 1 (Before Unlock): Manual Stage Spotlight
                isUserInteractingSpot = true;
                clearTimeout(spotTimeout);
                
                targetSpotX = clientX;
                targetSpotY = clientY;

                spotTimeout = setTimeout(() => {
                    isUserInteractingSpot = false;
                }, 2000);
            } 
            else if (!lightsOn && galleryUnlocked) {
                // PAGE 2: Manual Flashlight Control
                isUserInteractingFlash = true;
                clearTimeout(flashTimeout);

                targetFlashX = clientX;
                targetFlashY = clientY;

                flashTimeout = setTimeout(() => {
                    isUserInteractingFlash = false;
                }, 2000);
            }
        }

        // Apply input listeners to the entire interactive viewport
        interactionArea.addEventListener('touchmove', handlePointerMove, { passive: true });
        interactionArea.addEventListener('mousemove', handlePointerMove);
        interactionArea.addEventListener('touchstart', handlePointerMove, { passive: true });


        // --- MAIN APP CONTROLLER ---

        // 1. Turning Lights On/Off
        switchBtn.addEventListener('click', () => {
            if (!lightsOn) {
                // TURN THE STAGE SPOTLIGHT ON
                lightsOn = true;
                document.body.classList.add('spotlight-active');
                document.body.classList.remove('gallery-active');
                switchBtn.innerText = "Turn Light Off 💡";

                if (!galleryUnlocked) {
                    // Initial Welcome Screen sequence
                    welcomeScreen.style.display = 'flex';
                    cheekyScreen.style.display = 'none';
                    galleryContainer.style.display = 'none';
                    
                    // Display the reveal button but activate the slow 5-second fade in
                    loadMoreBtn.style.display = 'block';
                    loadMoreBtn.classList.add('first-reveal-fade');
                } else {
                    // Caught Cheating Screen (since they unlocked the gallery already)
                    welcomeScreen.style.display = 'none';
                    cheekyScreen.style.display = 'flex';
                    galleryContainer.style.display = 'none';
                    loadMoreBtn.style.display = 'none';

                    // SNAP SPOTLIGHT TARGETS DIRECTLY OVER THE CHEEKY MESSAGE
                    const rect = cheekyScreen.getBoundingClientRect();
                    targetSpotX = rect.left + rect.width / 2;
                    targetSpotY = rect.top + rect.height / 2;

                    // Add the pulsing flashing animation to the switch button
                    switchBtn.classList.add('suggest-tap');
                }
            } else {
                // TURN THE LIGHTS OFF (Return to Vault/Darkness)
                lightsOn = false;
                document.body.classList.remove('spotlight-active');
                switchBtn.innerText = "Turn Light On 💡";

                welcomeScreen.style.display = 'none';
                cheekyScreen.style.display = 'none';
                
                // Stop the pulsing animation instantly
                switchBtn.classList.remove('suggest-tap');

                if (galleryUnlocked) {
                    // Turn on the wandering flashlight and return to the active gallery
                    document.body.classList.add('gallery-active');
                    galleryContainer.style.display = 'grid';
                    loadMoreBtn.style.display = 'block';
                }
            }
        });

        // 2. Unveiling the Images (When they click the reveal button)
        function unveilVault() {
            window.scrollTo({ top: 0, behavior: 'instant' });

            if (!galleryUnlocked) {
                // First unlock sequence
                galleryUnlocked = true;
                lightsOn = false;
                
                // Cut the theater spotlight, activate the wandering flashlight
                document.body.classList.remove('spotlight-active');
                document.body.classList.add('gallery-active');
                
                // Hide welcome screen and show grid
                welcomeScreen.style.display = 'none';
                galleryContainer.style.display = 'grid';
                
                // Reset the button styles (remove the 5s delay anim) and change text
                loadMoreBtn.classList.remove('first-reveal-fade');
                loadMoreBtn.style.opacity = '1';
                loadMoreBtn.innerText = "Unveil 6 More";
                switchBtn.innerText = "Turn Light On 💡";
            }

            // Shuffle and show 6 random images
            galleryContainer.innerHTML = '';
            const shuffled = [...allImages].sort(() => 0.5 - Math.random());
            const selection = shuffled.slice(0, imagesToShow);

            selection.forEach((src) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'gallery-item-wrapper fade-in';

                const img = document.createElement('img');
                img.src = src;
                img.alt = "Private Gallery Image";
                img.className = "gallery-item";
                
                img.onerror = function() {
                    wrapper.style.display = 'none';
                };
                
                wrapper.appendChild(img);
                galleryContainer.appendChild(wrapper);
            });
        }

        loadMoreBtn.addEventListener('click', unveilVault);
    </script>

</body>
</html>
