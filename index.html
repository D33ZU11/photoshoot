<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Midnight Muse</title>
    <style>
        /* Deep, velvety dark background */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #151515 0%, #0a0a0a 100%);
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* Elegant, premium gold title */
        h1 {
            font-family: 'Playfair Display', Georgia, "Times New Roman", serif;
            color: #d4af37; /* Rich Gold */
            font-size: 3rem;
            font-weight: 400;
            margin-bottom: 5px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        /* Playful, provocative subtitle */
        p.subtitle {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            color: #a89060;
            font-size: 1.25rem;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        /* Responsive grid layout */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 28px;
            margin-bottom: 60px;
            justify-content: center;
        }

        /* Smooth, premium image container */
        .gallery-item-wrapper {
            overflow: hidden;
            border-radius: 8px;
            background-color: #111;
            aspect-ratio: 4 / 3;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.1); /* Subtle gold border */
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), 
                        box-shadow 0.4s cubic-bezier(0.165, 0.84, 0.44, 1),
                        border-color 0.4s ease;
            cursor: pointer;
        }

        /* Lift and glowing border on hover */
        .gallery-item-wrapper:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.4);
        }

        .gallery-item {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: block;
        }

        /* Slow cinematic zoom on hover */
        .gallery-item-wrapper:hover .gallery-item {
            transform: scale(1.08);
        }

        /* Seductive, glowing interactive button */
        .load-btn {
            background: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            padding: 16px 38px;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        /* Sleek hover state: button fills with gold, glows, and text turns dark */
        .load-btn:hover {
            background-color: #d4af37;
            color: #0a0a0a;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        .load-btn:active {
            transform: translateY(1px);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        /* Elegant fade-in for images */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }
    </style>
</head>
<body>

    <h1>The Velvet Vault</h1>
    <p class="subtitle">A private showcase of shadow & secrets. Strictly for your eyes only.</p>

    <!-- The container where JavaScript will inject the images -->
    <div id="gallery" class="gallery-grid"></div>

    <!-- The trigger button -->
    <button id="loadMoreBtn" class="load-btn">Unveil More Secrets</button>

    <script>
        const allImages = [
            "images/image1.jpg", "images/image2.jpg", "images/image3.jpg", "images/image4.jpg", "images/image5.jpg",
            "images/image6.jpg", "images/image7.jpg", "images/image8.jpg", "images/image9.jpg", "images/image10.jpg",
            "images/image11.jpg", "images/image12.jpg", "images/image13.jpg", "images/image14.jpg", "images/image15.jpg",
            "images/image16.jpg", "images/image17.jpg", "images/image18.jpg", "images/image19.jpg", "images/image20.jpg",
            "images/image21.jpg", "images/image22.jpg", "images/image23.jpg", "images/image24.jpg", "images/image25.jpg",
            "images/image26.jpg", "images/image27.jpg", "images/image28.jpg", "images/image29.jpg", "images/image30.jpg"
        ];

        const imagesToShow = 8;
        const galleryContainer = document.getElementById('gallery');
        const loadMoreBtn = document.getElementById('loadMoreBtn');

        // Function to select and display 8 completely random images
        function showRandomImages() {
            // Clear out the previous images from the screen
            galleryContainer.innerHTML = '';

            // Clone and shuffle the entire image array
            const shuffled = [...allImages].sort(() => 0.5 - Math.random());

            // Take the first 8 images from the shuffled deck
            const selection = shuffled.slice(0, imagesToShow);

            // Create and show them on the screen
            selection.forEach(src => {
                const wrapper = document.createElement('div');
                wrapper.className = 'gallery-item-wrapper fade-in';

                const img = document.createElement('img');
                img.src = src;
                img.alt = "Private Gallery Image";
                img.className = "gallery-item";
                
                // If an image doesn't exist, hide the broken container automatically
                img.onerror = function() {
                    wrapper.style.display = 'none';
                };
                
                wrapper.appendChild(img);
                galleryContainer.appendChild(wrapper);
            });
        }

        // When they click the button, grab a brand new set of random images
        loadMoreBtn.addEventListener('click', showRandomImages);

        // Load the first random batch immediately when the page finishes loading
        showRandomImages();
    </script>

</body>
</html>
