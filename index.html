<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        /* Modern, dark-mode inspired styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            background-color: #121212;
            color: #e0e0e0;
        }

        /* Responsive grid layout with masonry-like feel */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
            justify-content: center;
        }

        /* Container for individual images to handle zoom effects cleanly */
        .gallery-item-wrapper {
            overflow: hidden;
            border-radius: 12px;
            background-color: #1e1e1e;
            aspect-ratio: 4 / 3; /* Keeps all image containers uniform */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        /* Hover effect on the image container */
        .gallery-item-wrapper:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        .gallery-item {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            display: block;
        }

        /* Subtle zoom on the actual image when hovering */
        .gallery-item-wrapper:hover .gallery-item {
            transform: scale(1.05);
        }

        /* Modern, pill-shaped button styling */
        .load-btn {
            background-color: #ffffff;
            color: #121212;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .load-btn:hover {
            background-color: #e0e0e0;
            transform: scale(1.02);
        }

        .load-btn:active {
            transform: scale(0.98);
        }

        /* Quick fade-in animation for newly loaded images */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }
    </style>
</head>
<body>

    <!-- The container where JavaScript will inject the images -->
    <div id="gallery" class="gallery-grid"></div>

    <!-- The trigger button (still in the exact same place at the bottom) -->
    <button id="loadMoreBtn" class="load-btn">Show 5 New Random Images</button>

    <script>
        const allImages = [
            "images/image1.jpg", "images/image2.jpg", "images/image3.jpg", "images/image4.jpg", "images/image5.jpg",
            "images/image6.jpg", "images/image7.jpg", "images/image8.jpg", "images/image9.jpg", "images/image10.jpg",
            "images/image11.jpg", "images/image12.jpg", "images/image13.jpg", "images/image14.jpg", "images/image15.jpg",
            "images/image16.jpg", "images/image17.jpg", "images/image18.jpg", "images/image19.jpg", "images/image20.jpg",
            "images/image21.jpg", "images/image22.jpg", "images/image23.jpg", "images/image24.jpg", "images/image25.jpg",
            "images/image26.jpg", "images/image27.jpg", "images/image28.jpg", "images/image29.jpg", "images/image30.jpg"
        ];

        const imagesToShow = 5;
        const galleryContainer = document.getElementById('gallery');
        const loadMoreBtn = document.getElementById('loadMoreBtn');

        // Function to select and display 5 completely random images
        function showRandomImages() {
            // Clear out the previous images from the screen
            galleryContainer.innerHTML = '';

            // Clone and shuffle the entire image array
            const shuffled = [...allImages].sort(() => 0.5 - Math.random());

            // Take the first 5 images from the shuffled deck
            const selection = shuffled.slice(0, imagesToShow);

            // Create and show them on the screen
            selection.forEach(src => {
                const wrapper = document.createElement('div');
                wrapper.className = 'gallery-item-wrapper fade-in';

                const img = document.createElement('img');
                img.src = src;
                img.alt = "Gallery Image";
                img.className = "gallery-item";
                
                // If an image doesn't exist, hide the broken container automatically
                img.onerror = function() {
                    wrapper.style.display = 'none';
                };
                
                wrapper.appendChild(img);
                galleryContainer.appendChild(wrapper);
            });
        }

        // When they click the button, grab a brand new set of random images
        loadMoreBtn.addEventListener('click', showRandomImages);

        // Load the first random batch immediately when the page finishes loading
        showRandomImages();
    </script>

</body>
</html>
