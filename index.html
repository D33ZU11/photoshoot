<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Private Collection</title>
    <!-- Elegant, high-fashion editorial fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    
    <style>
        /* Sleek, dark studio gallery atmosphere */
        body {
            font-family: 'Montserrat', sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
            background: #080808;
            color: #f5f5f7;
            overflow-x: hidden;
        }

        /* Minimal, elegant luxury header */
        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            color: #e5c158; /* Soft Champagne Gold */
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 5px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        p.subtitle {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            color: #a69f88;
            font-size: 1.4rem;
            margin-bottom: 60px;
            letter-spacing: 2px;
        }

        /* Clean, sharp grid for 8 landscape/portrait balanced frames */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
            justify-content: center;
        }

        /* Fine-art luxury framing */
        .gallery-item-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 4px; /* Sleeker, sharper corners for an editorial look */
            background-color: #121212;
            aspect-ratio: 3 / 4; /* Classic portrait photo-frame ratio */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(229, 193, 88, 0.15); /* Delicate gold border */
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), 
                        box-shadow 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                        border-color 0.6s ease;
            cursor: pointer;
        }

        /* Elegant lift and glow on hover */
        .gallery-item-wrapper:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(229, 193, 88, 0.1);
            border-color: rgba(229, 193, 88, 0.6);
        }

        .gallery-item {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.9) contrast(1.05); /* Gives a premium, dramatic contrast */
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), 
                        filter 0.6s ease;
            display: block;
        }

        /* Slow, cinematic reveal on hover */
        .gallery-item-wrapper:hover .gallery-item {
            transform: scale(1.06);
            filter: brightness(1.05) contrast(1.05); /* Gently lights up the photo when she looks closer */
        }

        /* Sleek, understated luxury button */
        .load-btn {
            background: transparent;
            color: #e5c158;
            border: 1px solid rgba(229, 193, 88, 0.4);
            padding: 16px 45px;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            border-radius: 2px; /* Sharp, modern edge */
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Clean, dramatic inverted hover effect */
        .load-btn:hover {
            background-color: #e5c158;
            color: #080808;
            border-color: #e5c158;
            box-shadow: 0 10px 25px rgba(229, 193, 88, 0.2);
            transform: translateY(-2px);
        }

        .load-btn:active {
            transform: translateY(1px);
        }

        /* Elegant cascade fade-in */
        @keyframes editorialFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: editorialFade 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
    </style>
</head>
<body>

    <h1>The Private Collection</h1>
    <p class="subtitle">Strictly Confidential • For Your Eyes Only</p>

    <!-- The container where JavaScript will inject the images -->
    <div id="gallery" class="gallery-grid"></div>

    <!-- The minimalist, high-end button -->
    <button id="loadMoreBtn" class="load-btn">Reveal Next Set</button>

    <script>
        const allImages = [
            "images/image1.jpg", "images/image2.jpg", "images/image3.jpg", "images/image4.jpg", "images/image5.jpg",
            "images/image6.jpg", "images/image7.jpg", "images/image8.jpg", "images/image9.jpg", "images/image10.jpg",
            "images/image11.jpg", "images/image12.jpg", "images/image13.jpg", "images/image14.jpg", "images/image15.jpg",
            "images/image16.jpg", "images/image17.jpg", "images/image18.jpg", "images/image19.jpg", "images/image20.jpg",
            "images/image21.jpg", "images/image22.jpg", "images/image23.jpg", "images/image24.jpg", "images/image25.jpg",
            "images/image26.jpg", "images/image27.jpg", "images/image28.jpg", "images/image29.jpg", "images/image30.jpg"
        ];

        const imagesToShow = 8;
        const galleryContainer = document.getElementById('gallery');
        const loadMoreBtn = document.getElementById('loadMoreBtn');

        // Function to select and display 8 completely random images
        function showRandomImages() {
            galleryContainer.innerHTML = '';

            const shuffled = [...allImages].sort(() => 0.5 - Math.random());
            const selection = shuffled.slice(0, imagesToShow);

            selection.forEach((src, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'gallery-item-wrapper fade-in';
                // Beautiful cascading delay effect
                wrapper.style.animationDelay = `${index * 0.08}s`;

                const img = document.createElement('img');
                img.src = src;
                img.alt = "Private Gallery Image";
                img.className = "gallery-item";
                
                img.onerror = function() {
                    wrapper.style.display = 'none';
                };
                
                wrapper.appendChild(img);
                galleryContainer.appendChild(wrapper);
            });
        }

        loadMoreBtn.addEventListener('click', showRandomImages);
        showRandomImages();
    </script>

</body>
</html>
