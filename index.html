<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Private Collection</title>
    <!-- Elegant editorial fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* Force the app to fit exactly on a single mobile screen with zero scrolling */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents all scrolling */
            background: #080808;
            color: #f5f5f7;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
        }

        /* Main container structured as a flexbox to dynamically scale layout elements */
        .app-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            padding: 20px 15px;
            box-sizing: border-box;
        }

        /* Compact, elegant header */
        header {
            margin-top: 5px;
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            color: #e5c158; /* Soft Champagne Gold */
            font-size: 2rem;
            font-weight: 300;
            margin: 0 0 4px 0;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        p.subtitle {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            color: #a69f88;
            font-size: 1.05rem;
            margin: 0;
            letter-spacing: 1px;
        }

        /* Perfectly sized grid that auto-fits 6 images into the remaining screen height */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Clean 2-column layout for phones */
            grid-template-rows: repeat(3, 1fr);    /* Clean 3-row layout */
            gap: 12px;
            width: 100%;
            max-width: 450px;
            flex-grow: 1; /* Instructs the grid to stretch to fill the vertical space */
            margin: 10px 0;
        }

        /* Clean, sharp photo frames */
        .gallery-item-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background-color: #121212;
            border: 1px solid rgba(229, 193, 88, 0.15);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5);
            height: 100%;
            width: 100%;
        }

        .gallery-item {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.9) contrast(1.05);
            display: block;
            transition: transform 0.4s ease;
        }

        /* Seductive, low-profile button at the very bottom */
        .load-btn {
            background: transparent;
            color: #e5c158;
            border: 1px solid rgba(229, 193, 88, 0.4);
            padding: 12px 0;
            width: 100%;
            max-width: 280px;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent; /* Removes blue tap flash on iPhones */
        }

        .load-btn:active {
            background-color: #e5c158;
            color: #080808;
            border-color: #e5c158;
            transform: scale(0.98);
        }

        /* Quick, elegant fade-in for changing images */
        @keyframes quickFade {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        .fade-in {
            animation: quickFade 0.5s ease-out forwards;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <header>
            <h1>The Velvet Vault</h1>
            <p class="subtitle">Dare to look a little closer...</p>
        </header>

        <!-- The container that holds exactly 6 scaled images -->
        <div id="gallery" class="gallery-grid"></div>

        <!-- The control button -->
        <button id="loadMoreBtn" class="load-btn">Unveil Secrets</button>

    </div>

    <script>
        const allImages = [
            "images/image1.jpg", "images/image2.jpg", "images/image3.jpg", "images/image4.jpg", "images/image5.jpg",
            "images/image6.jpg", "images/image7.jpg", "images/image8.jpg", "images/image9.jpg", "images/image10.jpg",
            "images/image11.jpg", "images/image12.jpg", "images/image13.jpg", "images/image14.jpg", "images/image15.jpg",
            "images/image16.jpg", "images/image17.jpg", "images/image18.jpg", "images/image19.jpg", "images/image20.jpg",
            "images/image21.jpg", "images/image22.jpg", "images/image23.jpg", "images/image24.jpg", "images/image25.jpg",
            "images/image26.jpg", "images/image27.jpg", "images/image28.jpg", "images/image29.jpg", "images/image30.jpg"
        ];

        const imagesToShow = 6; // Set to exactly 6
        const galleryContainer = document.getElementById('gallery');
        const loadMoreBtn = document.getElementById('loadMoreBtn');

        // Function to select and display 6 completely random images
        function showRandomImages() {
            // Instantly send view back to the absolute top of the viewport
            window.scrollTo({ top: 0, behavior: 'instant' });

            galleryContainer.innerHTML = '';

            // Clone and shuffle
            const shuffled = [...allImages].sort(() => 0.5 - Math.random());
            const selection = shuffled.slice(0, imagesToShow);

            selection.forEach((src) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'gallery-item-wrapper fade-in';

                const img = document.createElement('img');
                img.src = src;
                img.alt = "Private Gallery Image";
                img.className = "gallery-item";
                
                img.onerror = function() {
                    wrapper.style.display = 'none';
                };
                
                wrapper.appendChild(img);
                galleryContainer.appendChild(wrapper);
            });
        }

        loadMoreBtn.addEventListener('click', showRandomImages);
        showRandomImages();
    </script>

</body>
</html>
